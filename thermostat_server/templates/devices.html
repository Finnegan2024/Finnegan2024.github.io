<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Devices</title>
</head>
<body>
    <h1>Device Management</h1>

    <h2>Add Device</h2>
    <form action="/devices/create" method="post">
        <label>Device Name</label>
        <input type="text" name="name" required>

        <label>Owner Account Name</label>
        <select name="owner_id" required>
            {% for account in accounts %}
                <option value="{{ account.account_id }}">{{ account.account_name }} - {{ account.account_id }}</option>
            {% endfor %}
        </select>

        <button type="submit">Create Device</button>
    </form>

    <h2>Existing Devices</h2>
    <ul>
        {% for device in devices %}
            <li>
                {{ device.device_name }}
                <form action="/devices/delete/{{ device.device_id }}" method="post" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
